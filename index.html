<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상평초 공수전분교장 e-가정통신문</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://unpkg.com/lucide@latest"></script>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    /* 인쇄용 설정 */
    @media print { 
      body { background: white !important; } 
      .print\:hidden { display: none !important; } 
      .print\:border-none { border: none !important; } 
      .print\:shadow-none { box-shadow: none !important; } 
      .print\:p-0 { padding: 0 !important; } 
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 1. Firebase 초기화 (Compat 방식) ---
    const firebaseConfig = {
      apiKey: "AIzaSyA4bDW9tzSINZQ1JwEO7XRm4ZQWsoJiFtM",
      authDomain: "e-form-f81f7.firebaseapp.com",
      projectId: "e-form-f81f7",
      storageBucket: "e-form-f81f7.firebasestorage.app",
      messagingSenderId: "733136134146",
      appId: "1:733136134146:web:c8f23540655f516958871b"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    const auth = firebase.auth();
    const db = firebase.firestore();
    const appId = 'sangpyeong-consent-app';

    // --- 2. 아이콘 컴포넌트 헬퍼 ---
    // Lucide 아이콘을 React에서 쓸 수 있게 변환해주는 함수
    const Icon = ({ name, size = 24, className = "" }) => {
      const ref = useRef();
      useEffect(() => {
        if (ref.current) {
          ref.current.innerHTML = '';
          const iconNode = lucide.createIcons({
            icons: { [name]: lucide.icons[name] },
            nameAttr: 'data-lucide',
            attrs: { width: size, height: size, class: className }
          });
          if(ref.current) lucide.createIcons({ root: ref.current });
        }
      }, [name, size, className]);
      return <i ref={ref} data-lucide={name}></i>;
    };

    // --- 3. 유틸리티 함수 ---
    const compressImage = (file) => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 800;
            let width = img.width;
            let height = img.height;
            if (width > MAX_WIDTH) {
              height = Math.round((height *= MAX_WIDTH / width));
              width = MAX_WIDTH;
            }
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.6));
          };
        };
      });
    };

    const formatDate = (date) => {
      if (!date) return '';
      const d = new Date(date);
      return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    };

    // --- 4. 공통 컴포넌트 ---
    const Toast = ({ message, type, onClose }) => {
      useEffect(() => {
        const timer = setTimeout(onClose, 3000);
        return () => clearTimeout(timer);
      }, [onClose]);

      return (
        <div className={`fixed bottom-4 left-1/2 transform -translate-x-1/2 px-4 py-3 rounded-xl shadow-2xl flex items-center gap-2 z-[100] border ${type === 'error' ? 'bg-red-50 text-red-800 border-red-200' : 'bg-slate-800 text-white border-slate-700'}`}>
          {type === 'error' ? <Icon name="AlertCircle" size={20} /> : <Icon name="CheckCircle2" size={20} className="text-green-400" />}
          <span className="font-medium">{message}</span>
        </div>
      );
    };

    const SignaturePad = ({ onSave, onClear }) => {
      const canvasRef = useRef(null);
      const [isDrawing, setIsDrawing] = useState(false);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (canvas) {
          const rect = canvas.getBoundingClientRect();
          canvas.width = rect.width * 2;
          canvas.height = rect.height * 2;
          const ctx = canvas.getContext('2d');
          ctx.scale(2, 2);
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
          ctx.lineWidth = 3;
          ctx.strokeStyle = '#000000';
        }
      }, []);

      const getCoordinates = (e) => {
        const canvas = canvasRef.current;
        const rect = canvas.getBoundingClientRect();
        if (e.touches && e.touches.length > 0) return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
      };

      const startDrawing = (e) => {
        e.preventDefault();
        const { x, y } = getCoordinates(e);
        const ctx = canvasRef.current.getContext('2d');
        ctx.beginPath();
        ctx.moveTo(x, y);
        setIsDrawing(true);
      };

      const draw = (e) => {
        e.preventDefault();
        if (!isDrawing) return;
        const { x, y } = getCoordinates(e);
        const ctx = canvasRef.current.getContext('2d');
        ctx.lineTo(x, y);
        ctx.stroke();
      };

      const stopDrawing = () => {
        setIsDrawing(false);
        if (onSave) onSave(canvasRef.current.toDataURL('image/png'));
      };

      const clearCanvas = () => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (onClear) onClear();
      };

      return (
        <div className="flex flex-col items-center w-full">
          <div className="w-full bg-white border-2 border-slate-300 rounded-xl overflow-hidden relative touch-none shadow-inner" style={{ height: '200px' }}>
            <canvas
              ref={canvasRef}
              className="w-full h-full cursor-crosshair"
              onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseLeave={stopDrawing}
              onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing}
            />
            <div className="absolute top-3 left-3 text-sm text-slate-400 pointer-events-none font-medium">이곳에 정자로 서명해주세요.</div>
          </div>
          <button type="button" onClick={clearCanvas} className="mt-3 text-sm font-semibold text-slate-500 hover:text-slate-700 bg-slate-100 px-4 py-1.5 rounded-lg transition-colors">
            서명 다시하기
          </button>
        </div>
      );
    };

    // --- 5. 학부모 제출 화면 ---
    const ParentView = ({ formId, onToast }) => {
      const [form, setForm] = useState(null);
      const [loading, setLoading] = useState(true);
      
      const [studentGrade, setStudentGrade] = useState('');
      const [studentName, setStudentName] = useState('');
      const [parentName, setParentName] = useState('');
      const [consentStatus, setConsentStatus] = useState('agree');
      const [signatureData, setSignatureData] = useState(null);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [submitted, setSubmitted] = useState(false);

      useEffect(() => {
        const fetchForm = async () => {
          try {
            const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('forms').doc(formId);
            const docSnap = await docRef.get();
            if (docSnap.exists) {
              setForm({ id: docSnap.id, ...docSnap.data() });
            } else {
              onToast('안내장을 찾을 수 없습니다.', 'error');
            }
          } catch(e) {
            console.error(e);
          }
          setLoading(false);
        };
        fetchForm();
      }, [formId]);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!studentGrade || !studentName || !parentName) return onToast('필수 정보를 입력해주세요.', 'error');
        if (!signatureData) return onToast('서명란에 서명해주세요.', 'error');
        setIsSubmitting(true);
        try {
          await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('submissions').add({
            formId, studentGrade, studentName, parentName, consentStatus, signatureData, createdAt: Date.now()
          });
          setSubmitted(true); window.scrollTo(0, 0);
        } catch (error) { onToast('제출 실패', 'error'); setIsSubmitting(false); }
      };

      if (loading) return <div className="min-h-screen bg-slate-50 flex justify-center items-center"><div className="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"></div></div>;
      
      if (submitted) return (
        <div className="min-h-screen bg-slate-100 flex items-center justify-center p-6">
          <div className="bg-white p-10 rounded-3xl shadow-xl max-w-sm w-full text-center">
            <div className="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6"><Icon name="CheckCircle2" size={50} className="text-green-600" /></div>
            <h2 className="text-2xl font-black text-slate-800 mb-2">동의서 제출 완료</h2>
            <p className="text-slate-500 font-medium mb-8">안전하게 학교로 전송되었습니다.<br/>감사합니다.</p>
            <div className="bg-slate-50 p-5 rounded-2xl text-left text-sm font-bold text-slate-700 border border-slate-200">
              <div className="flex justify-between mb-3"><span className="text-slate-400">학생</span> <span>{studentGrade}학년 {studentName}</span></div>
              <div className="flex justify-between mb-3"><span className="text-slate-400">학부모</span> <span>{parentName}</span></div>
              <div className="flex justify-between"><span className="text-slate-400">결과</span> <span className={consentStatus==='agree'?'text-blue-600':'text-red-600'}>{consentStatus==='agree'?'동의':'미동의'}</span></div>
            </div>
          </div>
        </div>
      );

      if(!form) return <div className="text-center mt-20 text-red-500 font-bold">잘못된 링크입니다.</div>;

      return (
        <div className="min-h-screen bg-slate-100 font-sans pb-20">
          <header className="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm p-4 text-center">
            <h1 className="font-black text-xl text-blue-900 tracking-tight">상평초 공수전분교장 가정통신문</h1>
          </header>

          <main className="max-w-xl mx-auto p-4 space-y-6 mt-4">
            <section className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
              <div className="p-6 bg-slate-800 text-white text-center"><h2 className="text-2xl font-black leading-snug">{form?.title}</h2></div>
              {form?.imageData && <div className="p-4 bg-slate-50 border-t"><img src={form.imageData} alt="안내장" className="w-full rounded-xl border border-slate-200 shadow-sm" /></div>}
            </section>

            <form onSubmit={handleSubmit} className="bg-white rounded-3xl shadow-sm border border-slate-200 p-8 space-y-10">
              <div>
                <h3 className="text-xl font-black text-slate-800 mb-5">1. 동의 여부</h3>
                <div className="flex gap-4">
                  <label className={`flex-1 flex flex-col items-center p-5 rounded-2xl border-2 cursor-pointer transition-all ${consentStatus === 'agree' ? 'border-blue-600 bg-blue-50 text-blue-800 shadow-inner' : 'border-slate-200 text-slate-400'}`}>
                    <input type="radio" name="consent" className="hidden" checked={consentStatus === 'agree'} onChange={() => setConsentStatus('agree')} />
                    <span className="text-xl font-black mb-1">동의함</span>
                  </label>
                  <label className={`flex-1 flex flex-col items-center p-5 rounded-2xl border-2 cursor-pointer transition-all ${consentStatus === 'disagree' ? 'border-red-500 bg-red-50 text-red-800 shadow-inner' : 'border-slate-200 text-slate-400'}`}>
                    <input type="radio" name="consent" className="hidden" checked={consentStatus === 'disagree'} onChange={() => setConsentStatus('disagree')} />
                    <span className="text-xl font-black mb-1">미동의</span>
                  </label>
                </div>
              </div>

              <div>
                <h3 className="text-xl font-black text-slate-800 mb-5">2. 인적사항 입력</h3>
                <div className="space-y-4">
                  <div className="flex gap-4">
                    <select value={studentGrade} onChange={e=>setStudentGrade(e.target.value)} className="w-1/3 px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 font-bold text-lg outline-none appearance-none">
                      <option value="">학년</option>{[1,2,3,4,5,6].map(g => <option key={g} value={g}>{g}학년</option>)}
                    </select>
                    <input type="text" value={studentName} onChange={e=>setStudentName(e.target.value)} placeholder="학생 이름" className="w-2/3 px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 font-bold text-lg outline-none" />
                  </div>
                  <input type="text" value={parentName} onChange={e=>setParentName(e.target.value)} placeholder="학부모 성명 (예: 홍길동 부)" className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 font-bold text-lg outline-none" />
                </div>
              </div>

              <div>
                <h3 className="text-xl font-black text-slate-800 mb-5">3. 보호자 전자 서명</h3>
                <SignaturePad onSave={setSignatureData} onClear={() => setSignatureData(null)} />
              </div>

              <button type="submit" disabled={isSubmitting} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 px-4 rounded-2xl flex items-center justify-center gap-2 transition-all shadow-xl shadow-blue-600/30 text-xl">
                {isSubmitting ? <div className="animate-spin rounded-full h-6 w-6 border-b-2 border-white"></div> : <Icon name="Save" size={24} />}
                동의서 학교로 전송하기
              </button>
            </form>
          </main>
        </div>
      );
    };

    // --- 6. 교사 관리자 화면 (결과 탭 위주로 요약) ---
    // (파일이 너무 길어지는 것을 방지하기 위해 핵심 기능인 '등록'과 '결과보기' 위주로 구성)
    const TeacherView = ({ user, onToast }) => {
      const [currentTab, setCurrentTab] = useState('forms');
      const [forms, setForms] = useState([]);
      const [submissions, setSubmissions] = useState([]);
      
      const [title, setTitle] = useState('');
      const [image, setImage] = useState(null);
      const [isUploading, setIsUploading] = useState(false);

      const [selectedFormId, setSelectedFormId] = useState('');
      const [viewMode, setViewMode] = useState('status');
      const [selectedSub, setSelectedSub] = useState(null);

      useEffect(() => {
        const formsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('forms');
        const subsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('submissions');

        const unsubForms = formsRef.onSnapshot(snap => {
          const fetchedForms = snap.docs.map(doc => ({id: doc.id, ...doc.data()})).sort((a,b)=>b.createdAt-a.createdAt);
          setForms(fetchedForms);
          if(fetchedForms.length > 0 && !selectedFormId) setSelectedFormId(fetchedForms[0].id);
        });
        const unsubSubs = subsRef.onSnapshot(snap => {
          setSubmissions(snap.docs.map(doc => ({id: doc.id, ...doc.data()})).sort((a,b)=>b.createdAt-a.createdAt));
        });

        return () => { unsubForms(); unsubSubs(); };
      }, []);

      const handleImageChange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const compressedBase64 = await compressImage(file);
        setImage(compressedBase64);
      };

      const handleSaveForm = async () => {
        if (!title.trim() || !image) return onToast('제목과 이미지를 모두 입력해주세요.', 'error');
        setIsUploading(true);
        try {
          await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('forms').add({
            title, imageData: image, teacherUid: user.uid, createdAt: Date.now()
          });
          onToast('안내장이 등록되었습니다.');
          setTitle(''); setImage(null);
        } catch (error) { onToast('등록 오류', 'error'); }
        setIsUploading(false);
      };

      const currentForm = forms.find(f => f.id === selectedFormId);
      const currentSubs = submissions.filter(s => s.formId === selectedFormId);

      const copyLink = (formId) => {
        const link = `${window.location.origin}${window.location.pathname}?formId=${formId}`;
        navigator.clipboard.writeText(`[상평초 공수전분교장]\n아래 링크를 눌러 동의서에 서명해주세요.\n\n${link}`).then(() => {
          onToast('발송 링크가 복사되었습니다. 카톡에 붙여넣기 하세요!');
        });
      };

      return (
        <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row">
          <aside className="w-full md:w-64 bg-slate-800 text-white shrink-0 shadow-xl z-10 print:hidden">
            <div className="p-6 border-b border-slate-700">
              <div className="font-black text-xl tracking-tight flex items-center gap-2">
                <Icon name="FileSignature" size={20} className="text-blue-400"/> e-동의서
              </div>
              <div className="text-xs text-slate-400 mt-2">상평초 공수전분교장</div>
            </div>
            <nav className="p-4 space-y-2">
              <button onClick={() => setCurrentTab('forms')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-colors font-bold ${currentTab==='forms'?'bg-blue-600 text-white':'text-slate-300 hover:bg-slate-700'}`}>
                <Icon name="Plus" size={18}/> 안내장 등록
              </button>
              <button onClick={() => setCurrentTab('results')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-colors font-bold ${currentTab==='results'?'bg-blue-600 text-white':'text-slate-300 hover:bg-slate-700'}`}>
                <Icon name="CheckSquare" size={18}/> 결과 확인
              </button>
            </nav>
            <div className="p-4 mt-auto">
              <button onClick={() => auth.signOut()} className="w-full flex items-center gap-2 text-slate-400 hover:text-white px-4 py-3 text-sm font-bold transition-colors">
                <Icon name="LogOut" size={16}/> 로그아웃
              </button>
            </div>
          </aside>

          <main className="flex-1 p-6 md:p-10 overflow-y-auto">
            {currentTab === 'forms' && (
              <div className="max-w-3xl mx-auto space-y-8 animate-fade-in-up">
                <section className="bg-white rounded-3xl shadow-sm border border-slate-200 p-8">
                  <h2 className="text-xl font-bold text-slate-800 mb-6">새 안내장 등록</h2>
                  <div className="space-y-4">
                    <input type="text" value={title} onChange={e => setTitle(e.target.value)} placeholder="안내장 제목 입력" className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 font-bold outline-none" />
                    <div>
                      <label className="flex flex-col items-center justify-center w-full h-40 border-2 border-slate-300 border-dashed rounded-xl cursor-pointer bg-slate-50 hover:bg-blue-50">
                        <span className="text-sm font-bold text-slate-500">클릭하여 안내장 이미지(JPG) 첨부</span>
                        <input type="file" accept="image/*" className="hidden" onChange={handleImageChange} />
                      </label>
                      {image && <img src={image} className="h-32 mt-4 rounded-lg border shadow-sm" alt="미리보기"/>}
                    </div>
                    <button onClick={handleSaveForm} disabled={isUploading} className="w-full bg-blue-600 text-white font-bold py-4 rounded-xl mt-4">
                      {isUploading ? '저장 중...' : '안내장 등록하기'}
                    </button>
                  </div>
                </section>

                <section>
                  <h2 className="text-xl font-bold text-slate-800 mb-4">등록된 안내장 목록</h2>
                  <div className="grid gap-4 md:grid-cols-2">
                    {forms.map(form => (
                      <div key={form.id} className="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm">
                        <h3 className="font-bold text-lg text-slate-800 mb-1">{form.title}</h3>
                        <p className="text-xs text-slate-400 mb-4">{formatDate(form.createdAt)}</p>
                        <button onClick={() => copyLink(form.id)} className="w-full bg-slate-100 text-slate-700 font-bold py-3 rounded-xl hover:bg-slate-200 flex items-center justify-center gap-2">
                          <Icon name="Copy" size={16}/> 카톡 공유용 링크 복사
                        </button>
                      </div>
                    ))}
                  </div>
                </section>
              </div>
            )}

            {currentTab === 'results' && (
              <div className="max-w-5xl mx-auto animate-fade-in-up">
                <div className="flex justify-between items-center mb-6">
                  <h2 className="text-2xl font-black text-slate-800">제출 결과 확인</h2>
                  <div className="flex bg-slate-200 p-1.5 rounded-xl border border-slate-300 print:hidden">
                    <button onClick={() => setViewMode('status')} className={`px-4 py-2 rounded-lg text-sm font-bold ${viewMode === 'status' ? 'bg-white shadow-md text-blue-700' : 'text-slate-500'}`}>목록 보기</button>
                    <button onClick={() => setViewMode('original')} className={`px-4 py-2 rounded-lg text-sm font-bold ${viewMode === 'original' ? 'bg-white shadow-md text-blue-700' : 'text-slate-500'}`}>인쇄/원본 보기</button>
                  </div>
                </div>

                <select value={selectedFormId} onChange={e => {setSelectedFormId(e.target.value); setSelectedSub(null);}} className="w-full max-w-md px-5 py-4 mb-6 bg-white border-2 border-blue-100 rounded-xl focus:ring-2 focus:ring-blue-500 font-bold text-slate-700 shadow-sm appearance-none print:hidden">
                  {forms.length === 0 && <option value="">등록된 안내장이 없습니다.</option>}
                  {forms.map(f => <option key={f.id} value={f.id}>{f.title} (총 {submissions.filter(s=>s.formId === f.id).length}건)</option>)}
                </select>

                {currentForm && viewMode === 'status' && (
                  <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <table className="w-full text-left border-collapse">
                      <thead>
                        <tr className="bg-slate-100 border-b border-slate-200">
                          <th className="py-4 px-6 font-bold text-slate-600">학생</th>
                          <th className="py-4 px-6 font-bold text-slate-600">학부모</th>
                          <th className="py-4 px-6 font-bold text-slate-600">제출결과</th>
                        </tr>
                      </thead>
                      <tbody>
                        {currentSubs.map(s => (
                          <tr key={s.id} className="border-b border-slate-100">
                            <td className="py-4 px-6 font-bold">{s.studentGrade}학년 {s.studentName}</td>
                            <td className="py-4 px-6 text-slate-600">{s.parentName}</td>
                            <td className="py-4 px-6">
                              <span className={`px-3 py-1 font-bold rounded-lg text-sm ${s.consentStatus === 'agree' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                {s.consentStatus === 'agree' ? '동의' : '미동의'}
                              </span>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}

                {currentForm && viewMode === 'original' && (
                  <div className="flex gap-6">
                    <div className="w-64 bg-white border border-slate-200 rounded-2xl p-2 shrink-0 print:hidden h-fit">
                      {currentSubs.map(s => (
                        <button key={s.id} onClick={() => setSelectedSub(s)} className={`w-full text-left p-4 rounded-xl text-sm font-bold border ${selectedSub?.id === s.id ? 'bg-blue-50 border-blue-200 text-blue-800' : 'border-transparent text-slate-600'}`}>
                          {s.studentName} ({s.consentStatus === 'agree'?'동의':'미동의'})
                        </button>
                      ))}
                    </div>

                    <div className="flex-1 bg-white border border-slate-200 rounded-2xl p-10 min-h-[800px] print:border-none print:shadow-none print:p-0">
                      {selectedSub ? (
                        <div className="max-w-[210mm] mx-auto text-slate-900 relative">
                           <button onClick={() => window.print()} className="absolute -top-4 -right-4 bg-slate-800 text-white px-5 py-2.5 rounded-xl font-bold shadow-lg hover:bg-slate-900 print:hidden">
                            인쇄하기
                          </button>
                          <div className="text-center border-b-2 border-black pb-6 mb-8 pt-4"><h1 className="text-3xl font-black">{currentForm.title}</h1></div>
                          {currentForm.imageData && <div className="mb-8 flex justify-center"><img src={currentForm.imageData} className="max-w-full border" /></div>}
                          <div className="border-t-2 border-black pt-8">
                            <div className="text-xl mb-8 font-bold">상기 내용에 <span className="text-2xl underline underline-offset-8 px-2">{selectedSub.consentStatus === 'agree' ? '동의합니다' : '동의하지 않습니다'}</span>.</div>
                            <div className="grid grid-cols-2 gap-4 mb-10 text-lg">
                              <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">학생: <b>{selectedSub.studentGrade}학년 {selectedSub.studentName}</b></div>
                              <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">학부모: <b>{selectedSub.parentName}</b></div>
                            </div>
                            <div className="flex flex-col items-end mr-4">
                              <div className="text-lg mb-2">{formatDate(selectedSub.createdAt)}</div>
                              <div className="flex items-center gap-4 text-2xl font-bold">
                                학부모 서명 :
                                <div className="w-32 h-16 border-b-2 border-black relative">
                                  {selectedSub.signatureData && <img src={selectedSub.signatureData} className="absolute bottom-1 h-20" />}
                                </div>
                              </div>
                            </div>
                            <div className="mt-20 text-center font-black text-2xl tracking-widest">상평초등학교장 귀하</div>
                          </div>
                        </div>
                      ) : <div className="text-center text-slate-400 font-bold mt-20">좌측에서 제출자를 선택하세요.</div>}
                    </div>
                  </div>
                )}
              </div>
            )}
          </main>
        </div>
      );
    };

    // --- 7. 최상위 앱 흐름 제어 ---
    const MainApp = () => {
      const [user, setUser] = useState(null);
      const [isTeacher, setIsTeacher] = useState(false);
      const [loading, setLoading] = useState(true);
      const [toast, setToast] = useState(null);
      const [formId, setFormId] = useState(new URLSearchParams(window.location.search).get('formId'));

      const showToast = (msg, type = 'success') => setToast({ message: msg, type });

      useEffect(() => {
        auth.onAuthStateChanged((currentUser) => {
          setUser(currentUser);
          setIsTeacher(currentUser?.providerData?.some(p => p.providerId === 'google.com'));
          setLoading(false);
        });
        
        // 학부모 화면 접근 시 자동 익명 로그인
        if (formId && !user) {
          auth.signInAnonymously().catch(e => console.error(e));
        }
      }, [formId]);

      if (loading) return <div className="min-h-screen flex items-center justify-center"><div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div></div>;

      return (
        <>
          {formId ? (
            <ParentView formId={formId} onToast={showToast} />
          ) : isTeacher ? (
            <TeacherView user={user} onToast={showToast} />
          ) : (
            <div className="min-h-screen bg-slate-50 flex items-center justify-center p-6">
              <div className="bg-white p-10 rounded-3xl shadow-xl max-w-sm w-full text-center">
                <div className="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6"><Icon name="FileSignature" size={40} className="text-blue-600"/></div>
                <h1 className="text-2xl font-black text-slate-800 mb-2">관리자 로그인</h1>
                <p className="text-slate-500 mb-8 text-sm">상평초등학교 공수전분교장</p>
                <button onClick={() => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())} className="w-full bg-white border-2 border-slate-200 text-slate-700 font-bold py-4 rounded-xl shadow-sm hover:bg-slate-50">
                  구글 계정으로 로그인
                </button>
              </div>
            </div>
          )}
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
        </>
      );
    };

    // --- 앱 렌더링 ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MainApp />);
  </script>
</body>
</html>
