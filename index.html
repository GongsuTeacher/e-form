<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상평초 공수전분교장 e-가정통신문</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    @media print { 
      body { background: white !important; } 
      .print\:hidden { display: none !important; } 
      .print\:border-none { border: none !important; } 
      .print\:shadow-none { box-shadow: none !important; } 
      .print\:p-0 { padding: 0 !important; } 
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const firebaseConfig = {
      apiKey: "AIzaSyA4bDW9tzSINZQ1JwEO7XRm4ZQWsoJiFtM",
      authDomain: "e-form-f81f7.firebaseapp.com",
      projectId: "e-form-f81f7",
      storageBucket: "e-form-f81f7.firebasestorage.app",
      messagingSenderId: "733136134146",
      appId: "1:733136134146:web:c8f23540655f516958871b"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const appId = 'sangpyeong-consent-app';

    const Icon = ({ name, size = 24, className = "" }) => {
      const spanRef = useRef(null);
      useEffect(() => {
        if (spanRef.current) {
          spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
          lucide.createIcons({ root: spanRef.current, attrs: { width: size, height: size, class: className } });
        }
      }, [name, size, className]);
      return <span ref={spanRef} className="inline-flex items-center justify-center"></span>;
    };

    const compressImage = (file) => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 800;
            let width = img.width;
            let height = img.height;
            if (width > MAX_WIDTH) {
              height = Math.round((height *= MAX_WIDTH / width));
              width = MAX_WIDTH;
            }
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.6));
          };
        };
      });
    };

    const formatDate = (date) => {
      if (!date) return '';
      const d = new Date(date);
      return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    };

    const blobToBase64 = (blob) => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result.split(',')[1]);
        reader.readAsDataURL(blob);
      });
    };

    const uploadToGas = async (pdfBlob, fileName, gasUrl, folderId) => {
      if (!gasUrl || !folderId) return;
      const base64File = await blobToBase64(pdfBlob);
      const payload = { folderId: folderId, filename: fileName, fileBase64: base64File };

      try {
        const res = await fetch(gasUrl, { method: 'POST', body: JSON.stringify(payload) });
        const result = await res.json();
        if(result.result !== 'success') throw new Error(result.message);
        return true;
      } catch(e) {
        throw new Error('드라이브 서버 전송에 실패했습니다.');
      }
    };

    const getStatusColorClass = (status, form) => {
      const opt1 = form?.responseType === 'participate' ? '참여함' : form?.responseType === 'custom' ? form.customOpt1 : '동의함';
      const opt2 = form?.responseType === 'participate' ? '불참' : form?.responseType === 'custom' ? form.customOpt2 : '미동의';
      if (status === opt1) return 'bg-blue-50 text-blue-700 border border-blue-200';
      if (status === opt2) return 'bg-red-50 text-red-700 border border-red-200';
      return 'bg-slate-50 text-slate-700 border border-slate-200';
    };

    const getStatusTextColor = (status, form) => {
      const opt1 = form?.responseType === 'participate' ? '참여함' : form?.responseType === 'custom' ? form.customOpt1 : '동의함';
      const opt2 = form?.responseType === 'participate' ? '불참' : form?.responseType === 'custom' ? form.customOpt2 : '미동의';
      if (status === opt1) return 'text-blue-700 decoration-blue-500';
      if (status === opt2) return 'text-red-700 decoration-red-500';
      return 'text-slate-900 decoration-slate-500';
    };

    const Toast = ({ message, type, onClose }) => {
      useEffect(() => {
        const timer = setTimeout(onClose, 4000);
        return () => clearTimeout(timer);
      }, [onClose]);
      return (
        <div className={`fixed bottom-4 left-1/2 transform -translate-x-1/2 px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 z-[200] border font-bold whitespace-nowrap ${type === 'error' ? 'bg-red-50 text-red-800 border-red-200' : 'bg-slate-800 text-white border-slate-700'}`}>
          {type === 'error' ? <Icon name="AlertCircle" size={24} /> : <Icon name="CheckCircle2" size={24} className="text-green-400" />}
          <span>{message}</span>
        </div>
      );
    };

    const SignaturePad = ({ onSave, onClear }) => {
      const canvasRef = useRef(null);
      const [isDrawing, setIsDrawing] = useState(false);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (canvas) {
          const rect = canvas.getBoundingClientRect();
          canvas.width = rect.width * 2;
          canvas.height = rect.height * 2;
          const ctx = canvas.getContext('2d');
          ctx.scale(2, 2);
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
          ctx.lineWidth = 3;
          ctx.strokeStyle = '#000000';
        }
      }, []);

      const getCoordinates = (e) => {
        const canvas = canvasRef.current;
        const rect = canvas.getBoundingClientRect();
        if (e.touches && e.touches.length > 0) return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
      };

      const startDrawing = (e) => {
        e.preventDefault();
        const { x, y } = getCoordinates(e);
        const ctx = canvasRef.current.getContext('2d');
        ctx.beginPath();
        ctx.moveTo(x, y);
        setIsDrawing(true);
      };

      const draw = (e) => {
        e.preventDefault();
        if (!isDrawing) return;
        const { x, y } = getCoordinates(e);
        const ctx = canvasRef.current.getContext('2d');
        ctx.lineTo(x, y);
        ctx.stroke();
      };

      const stopDrawing = () => {
        setIsDrawing(false);
        if (onSave) onSave(canvasRef.current.toDataURL('image/png'));
      };

      return (
        <div className="flex flex-col items-center w-full">
          <div className="w-full bg-white border-2 border-slate-300 rounded-xl overflow-hidden relative touch-none shadow-inner" style={{ height: '200px' }}>
            <canvas ref={canvasRef} className="w-full h-full cursor-crosshair" onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseLeave={stopDrawing} onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing} />
            <div className="absolute top-3 left-3 text-sm text-slate-400 pointer-events-none font-medium">이곳에 정자로 서명해주세요.</div>
          </div>
          <button type="button" onClick={() => {
            const ctx = canvasRef.current.getContext('2d');
            ctx.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);
            if (onClear) onClear();
          }} className="mt-3 text-sm font-semibold text-slate-500 hover:text-slate-700 bg-slate-100 px-4 py-1.5 rounded-lg transition-colors">
            서명 다시하기
          </button>
        </div>
      );
    };

    const ParentView = ({ formId, onToast }) => {
      const [form, setForm] = useState(null);
      const [loading, setLoading] = useState(true);
      const [studentGrade, setStudentGrade] = useState('');
      const [studentName, setStudentName] = useState('');
      const [parentRelation, setParentRelation] = useState('부');
      const [parentName, setParentName] = useState('');
      const [consentStatus, setConsentStatus] = useState('');
      const [signatureData, setSignatureData] = useState(null);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [submitted, setSubmitted] = useState(false);
      const [previewImage, setPreviewImage] = useState(null); 
      const pdfTargetRef = useRef(null); 

      useEffect(() => {
        const fetchForm = async () => {
          try {
            const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('forms').doc(formId);
            const docSnap = await docRef.get();
            if (docSnap.exists) {
              const formData = { id: docSnap.id, ...docSnap.data() };
              setForm(formData);
              if(formData.responseType === 'participate') setConsentStatus('참여함');
              else if(formData.responseType === 'custom') setConsentStatus(formData.customOpt1);
              else setConsentStatus('동의함');
            } else {
              onToast('안내장을 찾을 수 없습니다.', 'error');
            }
          } catch(e) {
            console.error(e);
          }
          setLoading(false);
        };
        fetchForm();
      }, [formId]);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!studentGrade || !studentName || !parentName) return onToast('필수 정보를 입력해주세요.', 'error');
        if (!signatureData) return onToast('서명란에 서명해주세요.', 'error');
        
        setIsSubmitting(true);
        try {
          await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('submissions').add({
            formId, studentGrade, studentName, parentName, parentRelation, consentStatus, signatureData, createdAt: Date.now()
          });

          const gasUrl = form.gasUrl || '';
          const folderId = form.driveFolderId || '';

          if (pdfTargetRef.current && gasUrl && folderId) {
            const opt = {
              margin: 0, 
              filename: `${studentGrade}학년_${studentName}_동의서.pdf`,
              image: { type: 'jpeg', quality: 0.98 },
              html2canvas: { scale: 2, useCORS: true, scrollY: 0 },
              jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            try {
              const pdfBlob = await html2pdf().set(opt).from(pdfTargetRef.current).output('blob');
              await uploadToGas(pdfBlob, `${studentGrade}학년_${studentName}_동의서.pdf`, gasUrl, folderId);
            } catch(e) {
              console.error("GAS 백그라운드 업로드 실패:", e);
            }
          }
          setSubmitted(true); 
          window.scrollTo(0, 0);
        } catch (error) { 
          onToast('제출에 실패했습니다. 인터넷 연결을 확인해주세요.', 'error'); 
        } finally {
          setIsSubmitting(false);
        }
      };

      const closeWindow = () => {
        window.open('', '_self', '');
        window.close();
        if (typeof WeixinJSBridge !== "undefined") WeixinJSBridge.call('closeWindow');
        setTimeout(() => { onToast('브라우저 설정상 창이 자동으로 닫히지 않을 수 있습니다. 창을 직접 닫아주세요.', 'error'); }, 500);
      };

      if (loading) return <div className="min-h-screen bg-slate-50 flex justify-center items-center"><div className="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"></div></div>;
      
      if (form && form.isClosed) {
        return (
          <div className="min-h-screen bg-slate-100 flex items-center justify-center p-6">
            <div className="bg-white p-10 rounded-3xl shadow-xl max-w-sm w-full text-center">
              <div className="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6"><Icon name="AlertCircle" size={40} className="text-red-500" /></div>
              <h2 className="text-2xl font-black text-slate-800 mb-2">기한 마감</h2>
              <p className="text-slate-500 font-medium">제출 기한이 마감된 안내장입니다.<br/>문의사항은 담임 선생님께 연락 바랍니다.</p>
            </div>
          </div>
        )
      }

      if (submitted) return (
        <div className="min-h-screen bg-slate-100 flex items-center justify-center p-6">
          <div className="bg-white p-10 rounded-3xl shadow-xl max-w-sm w-full text-center">
            <div className="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6"><Icon name="CheckCircle2" size={50} className="text-green-600" /></div>
            <h2 className="text-2xl font-black text-slate-800 mb-4">제출 완료</h2>
            <p className="text-slate-700 font-bold mb-10 text-lg leading-relaxed bg-slate-50 p-5 rounded-xl border border-slate-100">
              제출이 완료되었습니다.<br/>협조해 주셔서 정말 감사드립니다~^^ 🎉
            </p>
            <button onClick={closeWindow} className="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 rounded-xl shadow-md transition-colors text-lg flex items-center justify-center gap-2">
              <Icon name="LogOut" size={20}/> 창닫고 나가기
            </button>
            <p className="text-xs text-slate-400 mt-4">버튼이 작동하지 않으면 직접 화면 탭을 닫아주세요.</p>
          </div>
        </div>
      );

      if(!form) return <div className="text-center mt-20 text-red-500 font-bold">잘못된 링크입니다.</div>;

      const opt1 = form.responseType === 'participate' ? '참여함' : form.responseType === 'custom' ? form.customOpt1 : '동의함';
      const opt2 = form.responseType === 'participate' ? '불참' : form.responseType === 'custom' ? form.customOpt2 : '미동의';

      return (
        <div className="min-h-screen bg-slate-100 font-sans pb-20 relative">
          <header className="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm p-4 text-center">
            <h1 className="font-black text-xl text-blue-900 tracking-tight">상평초 공수전분교장 가정통신문</h1>
          </header>

          <main className="max-w-xl mx-auto p-4 space-y-6 mt-4">
            <section className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
              <div className="p-6 bg-slate-800 text-white text-center"><h2 className="text-2xl font-black leading-snug">{form.title}</h2></div>
              {form.imageData && (
                <div className="p-5 bg-slate-50 border-t flex flex-col items-center">
                  <p className="text-sm font-bold text-blue-600 mb-3 flex items-center gap-1 animate-pulse"><Icon name="ZoomIn" size={18}/> 안내장 이미지를 누르면 크게 확대됩니다!</p>
                  <img src={form.imageData} alt="안내장" className="w-full rounded-xl border border-slate-300 shadow-md cursor-pointer hover:opacity-90 transition-all" onClick={() => setPreviewImage(form.imageData)} />
                </div>
              )}
            </section>

            <form onSubmit={handleSubmit} className="bg-white rounded-3xl shadow-sm border border-slate-200 p-8 space-y-10">
              <div>
                <h3 className="text-xl font-black text-slate-800 mb-5">1. 회신 내용 선택</h3>
                <div className="flex gap-4">
                  <label className={`flex-1 flex flex-col items-center p-5 rounded-2xl border-2 cursor-pointer transition-all ${consentStatus === opt1 ? 'border-blue-600 bg-blue-50 text-blue-800 shadow-inner' : 'border-slate-200 text-slate-400'}`}>
                    <input type="radio" name="consent" className="hidden" checked={consentStatus === opt1} onChange={() => setConsentStatus(opt1)} />
                    <span className="text-xl font-black mb-1">{opt1}</span>
                  </label>
                  <label className={`flex-1 flex flex-col items-center p-5 rounded-2xl border-2 cursor-pointer transition-all ${consentStatus === opt2 ? 'border-red-500 bg-red-50 text-red-800 shadow-inner' : 'border-slate-200 text-slate-400'}`}>
                    <input type="radio" name="consent" className="hidden" checked={consentStatus === opt2} onChange={() => setConsentStatus(opt2)} />
                    <span className="text-xl font-black mb-1">{opt2}</span>
                  </label>
                </div>
              </div>

              <div>
                <h3 className="text-xl font-black text-slate-800 mb-5">2. 인적사항 입력</h3>
                <div className="space-y-4">
                  <div className="flex gap-3">
                    <select value={studentGrade} onChange={e=>setStudentGrade(e.target.value)} className="w-[100px] px-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 font-bold text-lg outline-none appearance-none shrink-0">
                      <option value="">학년</option>{[1,2,3,4,5,6].map(g => <option key={g} value={g}>{g}학년</option>)}
                    </select>
                    <input type="text" value={studentName} onChange={e=>setStudentName(e.target.value)} placeholder="학생 이름" className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 font-bold text-lg outline-none" />
                  </div>
                  <div className="flex gap-3">
                    <select value={parentRelation} onChange={e=>setParentRelation(e.target.value)} className="w-[100px] px-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 font-bold text-lg outline-none appearance-none shrink-0">
                      {['부', '모', '조부', '조모', '외조부', '외조모', '친척', '후견인', '보호자'].map(r => <option key={r} value={r}>{r}</option>)}
                    </select>
                    <input type="text" value={parentName} onChange={e=>setParentName(e.target.value)} placeholder="성명 입력" className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 font-bold text-lg outline-none" />
                  </div>
                </div>
              </div>

              <div>
                <h3 className="text-xl font-black text-slate-800 mb-5">3. 보호자 전자 서명</h3>
                <SignaturePad onSave={setSignatureData} onClear={() => setSignatureData(null)} />
              </div>

              <button type="submit" disabled={isSubmitting} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 px-4 rounded-2xl flex items-center justify-center gap-2 transition-all shadow-xl shadow-blue-600/30 text-xl">
                {isSubmitting ? (
                   <span className="flex items-center gap-2"><div className="animate-spin rounded-full h-6 w-6 border-b-2 border-white"></div>제출 및 PDF 변환 중...</span>
                ) : (
                   <span className="flex items-center gap-2"><Icon name="Save" size={24} /> 동의서 학교로 전송하기</span>
                )}
              </button>
            </form>
          </main>

          {previewImage && (
            <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[200] p-4 md:p-8" onClick={()=>setPreviewImage(null)}>
               <div className="relative w-full max-w-4xl max-h-[95vh] overflow-y-auto bg-white rounded-2xl p-2" onClick={e=>e.stopPropagation()}>
                  <button onClick={()=>setPreviewImage(null)} className="absolute top-4 right-4 bg-slate-800 hover:bg-slate-900 text-white rounded-full p-2 shadow-lg z-10 transition-colors"><Icon name="X" size={24}/></button>
                  <img src={previewImage} className="w-full h-auto rounded-xl" alt="안내장 원본 확대"/>
               </div>
            </div>
          )}

          <div style={{ position: 'absolute', left: '-9999px', top: '-9999px' }}>
            <div ref={pdfTargetRef} style={{ width: '210mm', height: '296mm', padding: '15mm', backgroundColor: 'white', color: 'black', fontFamily: 'sans-serif', boxSizing: 'border-box', display: 'flex', flexDirection: 'column' }}>
              <div style={{ textAlign: 'center', borderBottom: '2px solid black', paddingBottom: '10px', marginBottom: '10px', flexShrink: 0 }}>
                <h1 style={{ fontSize: '22px', fontWeight: 'bold', margin: 0 }}>{form.title}</h1>
              </div>
              <div style={{ flex: '1 1 auto', display: 'flex', justifyContent: 'center', alignItems: 'center', overflow: 'hidden', minHeight: '80mm', maxHeight: '130mm', marginBottom: '10px' }}>
                <img src={form.imageData} style={{ maxWidth: '100%', maxHeight: '100%', objectFit: 'contain' }} alt="안내장" />
              </div>
              <div style={{ borderTop: '2px solid black', paddingTop: '15px', flexShrink: 0 }}>
                <p style={{ fontSize: '18px', marginBottom: '15px' }}>
                  상기 내용에 <strong style={{ textDecoration: 'underline', color: form?.responseType === 'participate' ? (consentStatus === '참여함' ? '#1d4ed8' : '#b91c1c') : form?.responseType === 'custom' ? (consentStatus === form.customOpt1 ? '#1d4ed8' : '#b91c1c') : (consentStatus === '동의함' ? '#1d4ed8' : '#b91c1c') }}>{consentStatus}</strong>.
                </p>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '15px' }}>
                  <div style={{ padding: '10px', border: '1px solid #ccc', borderRadius: '8px', width: '48%' }}>
                    <span style={{ fontSize: '12px', color: '#666', display: 'block' }}>학생 정보</span>
                    <strong>{studentGrade}학년 {studentName}</strong>
                  </div>
                  <div style={{ padding: '10px', border: '1px solid #ccc', borderRadius: '8px', width: '48%' }}>
                    <span style={{ fontSize: '12px', color: '#666', display: 'block' }}>학부모 정보</span>
                    <strong>{parentRelation} {parentName}</strong>
                  </div>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', marginRight: '10px' }}>
                   <span style={{ fontSize: '14px', color: '#666', marginBottom: '5px' }}>{formatDate(Date.now())} 제출됨</span>
                   <div style={{ display: 'flex', alignItems: 'flex-end', fontSize: '18px', fontWeight: 'bold' }}>
                      학부모 서명:
                      <div style={{ width: '120px', borderBottom: '2px solid black', marginLeft: '10px', textAlign: 'center', height: '40px', position: 'relative' }}>
                        {signatureData && <img src={signatureData} style={{ maxHeight: '100%', maxWidth: '100%', position: 'absolute', bottom: '2px', left: '50%', transform: 'translateX(-50%)' }} />}
                      </div>
                   </div>
                </div>
                <h2 style={{ textAlign: 'center', marginTop: '20px', fontSize: '22px', fontWeight: 'bold', letterSpacing: '2px' }}>상평초등학교장 귀하</h2>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const TeacherView = ({ user, onToast }) => {
      const [currentTab, setCurrentTab] = useState('forms');
      const [forms, setForms] = useState([]);
      const [submissions, setSubmissions] = useState([]);
      const [contacts, setContacts] = useState([]);
      const [settings, setSettings] = useState({ smsApiKey: '', smsApiSecret: '', senderPhone: '033-672-4268', gasUrl: '', driveFolderId: '' });
      const [selectedFormId, setSelectedFormId] = useState('');
      const [viewMode, setViewMode] = useState('status');

      useEffect(() => {
        const formsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('forms');
        const subsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('submissions');
        const contactsRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('contacts');
        const settingsRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('settings').doc('config');

        const unsubForms = formsRef.onSnapshot(snap => {
          const fetchedForms = snap.docs.map(doc => ({id: doc.id, ...doc.data()})).sort((a,b)=>b.createdAt-a.createdAt);
          setForms(fetchedForms);
          if(fetchedForms.length > 0 && !selectedFormId) setSelectedFormId(fetchedForms[0].id);
        });
        const unsubSubs = subsRef.onSnapshot(snap => {
          setSubmissions(snap.docs.map(doc => ({id: doc.id, ...doc.data()})).sort((a,b)=>b.createdAt-a.createdAt));
        });
        const unsubContacts = contactsRef.onSnapshot(snap => {
          setContacts(snap.docs.map(doc => ({id: doc.id, ...doc.data()})));
        });
        
        settingsRef.get().then(doc => { if(doc.exists) setSettings(doc.data()); });

        return () => { unsubForms(); unsubSubs(); unsubContacts(); };
      }, []);

      const goToResults = (formId, mode = 'status') => {
        setSelectedFormId(formId);
        setViewMode(mode);
        setCurrentTab('results');
      }

      const NavButton = ({ id, icon, label }) => {
        const isActive = currentTab === id;
        return (
          <button onClick={() => setCurrentTab(id)} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all font-bold text-sm ${isActive ? 'bg-blue-50 text-blue-600' : 'text-slate-500 hover:bg-slate-50'}`}>
            <Icon name={icon} size={20} className={isActive ? 'text-blue-600' : 'text-slate-400'}/> {label}
          </button>
        )
      };

      return (
        <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row">
          <aside className="w-full md:w-64 bg-white border-r border-slate-200 shrink-0 z-10 print:hidden flex flex-col">
            <div className="p-6 border-b border-slate-100">
              <div className="font-black text-xl tracking-tight flex items-center gap-2 text-blue-800">
                <Icon name="FileSignature" size={24} className="text-blue-600"/> e-동의서 관리
              </div>
              <div className="text-xs text-slate-500 bg-slate-100 p-2 rounded-lg font-medium mt-3">상평초 공수전분교장</div>
            </div>
            <nav className="p-4 space-y-1 flex-1 overflow-y-auto">
              <NavButton id="forms" icon="FileText" label="안내장 등록/발송" />
              <NavButton id="contacts" icon="Users" label="학부모 주소록" />
              <NavButton id="results" icon="CheckSquare" label="취합 결과 확인" />
              <NavButton id="settings" icon="Settings" label="환경설정 (각종 연동)" />
            </nav>
            <div className="p-4 mt-auto border-t border-slate-100">
              <button onClick={() => auth.signOut()} className="w-full flex items-center justify-center gap-2 text-slate-500 bg-slate-50 hover:bg-red-50 hover:text-red-600 px-4 py-3 rounded-xl text-sm font-bold transition-colors">
                <Icon name="LogOut" size={16}/> 로그아웃
              </button>
            </div>
          </aside>

          <main className="flex-1 p-6 md:p-10 overflow-y-auto h-screen">
            {currentTab === 'forms' && <TeacherFormsTab db={db} appId={appId} user={user} forms={forms} settings={settings} onToast={onToast} goToResults={goToResults} />}
            {currentTab === 'contacts' && <TeacherContactsTab db={db} appId={appId} user={user} contacts={contacts} onToast={onToast} />}
            {currentTab === 'results' && <TeacherResultsTab forms={forms} submissions={submissions} selectedFormId={selectedFormId} setSelectedFormId={setSelectedFormId} viewMode={viewMode} setViewMode={setViewMode} onToast={onToast} settings={settings} />}
            {currentTab === 'settings' && <TeacherSettingsTab db={db} appId={appId} user={user} settings={settings} onToast={onToast} />}
          </main>
        </div>
      );
    };

    const TeacherFormsTab = ({ db, appId, user, forms, settings, onToast, goToResults }) => {
      const [title, setTitle] = useState('');
      const [image, setImage] = useState(null);
      const [driveLink, setDriveLink] = useState('');
      const [isUploading, setIsUploading] = useState(false);
      const [responseType, setResponseType] = useState('agree');
      const [customOpt1, setCustomOpt1] = useState('');
      const [customOpt2, setCustomOpt2] = useState('');
      const [previewImage, setPreviewImage] = useState(null);

      const handleImageChange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const compressedBase64 = await compressImage(file);
        setImage(compressedBase64);
      };

      const handleSaveForm = async () => {
        if (!title.trim() || !image) return onToast('제목과 이미지를 모두 입력해주세요.', 'error');
        if (responseType === 'custom' && (!customOpt1.trim() || !customOpt2.trim())) return onToast('직접 입력 옵션명을 기입해주세요.', 'error');
        setIsUploading(true);
        try {
          await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('forms').add({
            title, imageData: image, teacherUid: user.uid, createdAt: Date.now(),
            responseType, customOpt1, customOpt2, isClosed: false,
            gasUrl: settings.gasUrl || '',
            driveFolderId: settings.driveFolderId || '',
            driveLink: driveLink.trim()
          });
          onToast('안내장이 등록되었습니다.');
          setTitle(''); setImage(null); setResponseType('agree'); setCustomOpt1(''); setCustomOpt2(''); setDriveLink('');
        } catch (error) { onToast('등록 오류', 'error'); }
        setIsUploading(false);
      };

      const toggleStatus = async (formId, currentStatus) => {
        try {
          await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('forms').doc(formId).update({ isClosed: !currentStatus });
          onToast(currentStatus ? '안내장이 다시 오픈되었습니다.' : '안내장이 마감처리 되었습니다.');
        } catch (e) { onToast('상태 변경 오류', 'error'); }
      };

      const handleDeleteForm = async (formId) => {
        if (window.confirm('정말 삭제하시겠습니까?\n이 안내장에 제출된 학부모님의 결과 및 원문 데이터도 함께 영구적으로 삭제됩니다.')) {
          try {
            await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('forms').doc(formId).delete();
            const subsSnapshot = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('submissions').where('formId', '==', formId).get();
            const batch = db.batch();
            subsSnapshot.forEach(doc => { batch.delete(doc.ref); });
            await batch.commit();
            onToast('안내장과 관련 데이터가 모두 삭제되었습니다.');
          } catch (error) { onToast('삭제 중 오류가 발생했습니다.', 'error'); }
        }
      };

      const copyLink = (formId) => {
        const link = `${window.location.origin}${window.location.pathname}?formId=${formId}`;
        navigator.clipboard.writeText(`[상평초 공수전분교장]\n아래 링크를 눌러 동의서에 서명해주세요.\n\n${link}`).then(() => {
          onToast('발송 링크가 복사되었습니다. 카톡에 붙여넣기 하세요!');
        });
      };

      return (
        <div className="max-w-4xl mx-auto space-y-10 animate-fade-in-up pb-20">
          <section className="bg-white rounded-3xl shadow-sm border border-slate-200 p-8">
            <h2 className="text-xl font-bold text-slate-800 mb-6">새 안내장 등록</h2>
            <div className="space-y-6">
              <input type="text" value={title} onChange={e => setTitle(e.target.value)} placeholder="안내장 제목 입력" className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 font-bold outline-none text-lg" />
              <div className="p-5 bg-slate-50 border border-slate-200 rounded-xl">
                <p className="text-sm font-bold text-slate-700 mb-3">응답 선택지 유형</p>
                <div className="flex gap-4">
                  <label className="flex items-center gap-2 cursor-pointer font-bold"><input type="radio" checked={responseType==='agree'} onChange={()=>setResponseType('agree')} className="w-4 h-4"/> 동의 / 미동의</label>
                  <label className="flex items-center gap-2 cursor-pointer font-bold"><input type="radio" checked={responseType==='participate'} onChange={()=>setResponseType('participate')} className="w-4 h-4"/> 참여 / 불참</label>
                  <label className="flex items-center gap-2 cursor-pointer font-bold"><input type="radio" checked={responseType==='custom'} onChange={()=>setResponseType('custom')} className="w-4 h-4"/> 직접입력</label>
                </div>
                {responseType === 'custom' && (
                  <div className="flex gap-3 mt-4">
                    <input type="text" value={customOpt1} onChange={e=>setCustomOpt1(e.target.value)} placeholder="옵션 1 (예: 구입함)" className="flex-1 px-4 py-2 border rounded-lg outline-none focus:border-blue-500"/>
                    <input type="text" value={customOpt2} onChange={e=>setCustomOpt2(e.target.value)} placeholder="옵션 2 (예: 구입안함)" className="flex-1 px-4 py-2 border rounded-lg outline-none focus:border-blue-500"/>
                  </div>
                )}
              </div>
              <div className="px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl">
                <p className="text-sm font-bold text-slate-700 mb-2 flex items-center gap-2"><Icon name="FolderUp" size={16}/> 취합 서류 보관용 구글 드라이브 링크 (선택사항)</p>
                <input type="text" value={driveLink} onChange={e => setDriveLink(e.target.value)} placeholder="예: https://drive.google.com/drive/folders/..." className="w-full px-4 py-3 bg-white border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm font-mono" />
                <p className="text-xs text-slate-400 mt-2">* 여기에 공유 드라이브 링크를 넣어두시면, 나중에 '결과 확인' 탭에서 클릭 한 번으로 폴더를 열 수 있습니다.</p>
              </div>
              <div>
                <label className="flex flex-col items-center justify-center w-full h-40 border-2 border-slate-300 border-dashed rounded-xl cursor-pointer bg-slate-50 hover:bg-blue-50 transition-colors">
                  <span className="text-sm font-bold text-slate-500 flex items-center gap-2"><Icon name="FileText" size={20}/> 클릭하여 안내장 이미지(JPG) 첨부</span>
                  <input type="file" accept="image/*" className="hidden" onChange={handleImageChange} />
                </label>
                {image && <div className="mt-4 inline-block relative"><img src={image} className="h-32 rounded-lg border shadow-sm" alt="미리보기"/><button onClick={()=>setImage(null)} className="absolute -top-2 -right-2 bg-slate-800 text-white rounded-full p-1"><Icon name="Trash2" size={14}/></button></div>}
              </div>
              <button onClick={handleSaveForm} disabled={isUploading} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-md transition-all text-lg">
                {isUploading ? '저장 중...' : '안내장 등록하기'}
              </button>
            </div>
          </section>

          <section className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
            <div className="p-6 border-b border-slate-100 bg-slate-50">
               <h2 className="text-xl font-bold text-slate-800">등록된 안내장 목록</h2>
            </div>
            <div className="max-h-[500px] overflow-y-auto no-scrollbar p-2">
              {forms.length === 0 && <div className="p-10 text-center text-slate-400 font-bold">등록된 안내장이 없습니다.</div>}
              {forms.map(form => (
                <div key={form.id} className="flex flex-col md:flex-row items-center justify-between p-4 border-b border-slate-100 hover:bg-slate-50 transition-colors gap-4 group">
                  <div className="flex-1 cursor-pointer w-full" onClick={() => setPreviewImage(form.imageData)}>
                    <h3 className="font-bold text-lg text-slate-800 hover:text-blue-600 line-clamp-1 break-all">{form.title}</h3>
                    <div className="flex items-center gap-2 mt-1">
                      <span className="text-xs text-slate-400 font-mono">{formatDate(form.createdAt)}</span>
                      {form.isClosed && <span className="text-[10px] bg-red-100 text-red-600 px-2 py-0.5 rounded-full font-bold">마감됨</span>}
                    </div>
                  </div>
                  <div className="flex gap-2 shrink-0 w-full md:w-auto overflow-x-auto pb-1 md:pb-0">
                    <button onClick={() => toggleStatus(form.id, form.isClosed)} className={`px-4 py-2 text-sm font-bold rounded-lg border transition-colors whitespace-nowrap ${form.isClosed ? 'border-green-200 text-green-700 hover:bg-green-50' : 'border-slate-300 text-slate-600 hover:bg-slate-100'}`}>
                      {form.isClosed ? '다시오픈' : '마감처리'}
                    </button>
                    <button onClick={() => copyLink(form.id)} className="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-bold rounded-lg flex items-center gap-1 transition-colors whitespace-nowrap">
                      <Icon name="Copy" size={16}/> 공유링크
                    </button>
                    <button onClick={() => goToResults(form.id, 'status')} className="px-4 py-2 bg-blue-50 hover:bg-blue-100 text-blue-700 text-sm font-bold rounded-lg whitespace-nowrap transition-colors">
                      결과확인
                    </button>
                    <button onClick={() => goToResults(form.id, 'original')} className="px-4 py-2 bg-slate-800 hover:bg-slate-900 text-white text-sm font-bold rounded-lg whitespace-nowrap transition-colors">
                      원본확인
                    </button>
                    <button onClick={() => handleDeleteForm(form.id)} className="px-3 py-2 bg-red-50 hover:bg-red-100 text-red-500 text-sm font-bold rounded-lg transition-colors flex items-center justify-center shrink-0" title="안내장 삭제">
                      <Icon name="Trash2" size={18}/>
                    </button>
                  </div>
                </div>
              ))}
            </div>
          </section>

          {previewImage && (
            <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[200] p-4" onClick={()=>setPreviewImage(null)}>
               <div className="relative max-w-2xl w-full max-h-[90vh] overflow-y-auto bg-white rounded-xl p-2" onClick={e=>e.stopPropagation()}>
                  <button onClick={()=>setPreviewImage(null)} className="absolute top-4 right-4 bg-slate-800 text-white rounded-full p-2 shadow-lg"><Icon name="X" size={20}/></button>
                  {previewImage ? <img src={previewImage} className="w-full h-auto rounded-lg" alt="안내장 원본"/> : <div className="p-10 text-center font-bold">이미지가 없습니다.</div>}
               </div>
            </div>
          )}
        </div>
      );
    };

    const TeacherContactsTab = ({ db, appId, user, contacts, onToast }) => {
      const [studentGrade, setStudentGrade] = useState('');
      const [studentClass, setStudentClass] = useState('');
      const [studentName, setStudentName] = useState('');
      const [parentName, setParentName] = useState('');
      const [phone, setPhone] = useState('');
      const fileInputRef = useRef(null);

      const handleAddContact = async (e) => {
        e.preventDefault();
        if (!studentGrade || !studentClass || !studentName || !parentName || !phone) return onToast('모든 항목을 입력해주세요.', 'error');
        try {
          await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('contacts').add({ 
            studentGrade: Number(studentGrade), studentClass: String(studentClass), studentName, parentName, phone, createdAt: Date.now() 
          });
          onToast('주소록에 추가되었습니다.');
          setStudentGrade(''); setStudentClass(''); setStudentName(''); setParentName(''); setPhone('');
        } catch (error) { onToast('추가 오류', 'error'); }
      };

      const handleDelete = async (id) => {
        if(window.confirm('정말 삭제하시겠습니까?')) {
           await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('contacts').doc(id).delete();
           onToast('삭제되었습니다.');
        }
      };

      const downloadTemplate = () => {
        const ws = XLSX.utils.json_to_sheet([ { "학년": 1, "반": 1, "학생성명": "홍길동", "학부모성명": "홍파파", "연락처": "010-1234-5678" } ]);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "학부모주소록");
        XLSX.writeFile(wb, "상평초_학부모주소록_일괄등록양식.xlsx");
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = async (evt) => {
          try {
            const data = new Uint8Array(evt.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(worksheet);
            let count = 0;
            const batch = db.batch();
            json.forEach(row => {
               if(row.학년 && row.반 && row.학생성명 && row.학부모성명 && row.연락처) {
                  const docRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('contacts').doc();
                  batch.set(docRef, { studentGrade: Number(row.학년), studentClass: String(row.반), studentName: String(row.학생성명), parentName: String(row.학부모성명), phone: String(row.연락처), createdAt: Date.now() });
                  count++;
               }
            });
            await batch.commit();
            onToast(`${count}명의 연락처가 일괄 등록되었습니다.`);
          } catch(err) {
            onToast('엑셀 파일 분석 오류가 발생했습니다.', 'error');
          }
          if(fileInputRef.current) fileInputRef.current.value = '';
        };
        reader.readAsArrayBuffer(file);
      };

      const sortedContacts = [...contacts].sort((a, b) => {
        const gradeA = Number(a.studentGrade) || 0;
        const gradeB = Number(b.studentGrade) || 0;
        if (gradeA !== gradeB) return gradeA - gradeB;
        const nameA = a.studentName || '';
        const nameB = b.studentName || '';
        return nameA.localeCompare(nameB, 'ko-KR');
      });

      return (
        <div className="max-w-5xl mx-auto animate-fade-in-up space-y-8">
          <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <div className="bg-slate-50 p-6 border-b flex justify-between items-center">
               <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2"><Icon name="Users" size={24} className="text-blue-600"/> 학부모 연락처 등록</h2>
               <div className="flex gap-2">
                 <button onClick={downloadTemplate} className="px-4 py-2 bg-white border border-slate-300 text-slate-700 text-sm font-bold rounded-lg hover:bg-slate-50 shadow-sm">엑셀 양식 다운로드</button>
                 <label className="px-4 py-2 bg-green-600 hover:bg-green-700 text-white text-sm font-bold rounded-lg shadow-sm cursor-pointer transition-colors">
                    엑셀 일괄 업로드
                    <input type="file" accept=".xlsx, .xls" className="hidden" onChange={handleFileUpload} ref={fileInputRef}/>
                 </label>
               </div>
            </div>
            <div className="p-8">
              <form onSubmit={handleAddContact} className="flex flex-col md:flex-row gap-3">
                <select value={studentGrade} onChange={e=>setStudentGrade(e.target.value)} className="w-full md:w-28 px-4 py-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 font-bold outline-none appearance-none shrink-0">
                  <option value="">학년</option>{[1,2,3,4,5,6].map(g => <option key={g} value={g}>{g}학년</option>)}
                </select>
                <input type="text" value={studentClass} onChange={e=>setStudentClass(e.target.value)} placeholder="반" className="w-full md:w-20 px-4 py-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 font-bold outline-none shrink-0" />
                <input type="text" value={studentName} onChange={e=>setStudentName(e.target.value)} placeholder="학생 성명" className="flex-1 px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 font-bold outline-none" />
                <input type="text" value={parentName} onChange={e=>setParentName(e.target.value)} placeholder="학부모 성명" className="flex-1 px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 font-bold outline-none" />
                <input type="text" value={phone} onChange={e=>setPhone(e.target.value)} placeholder="연락처 (- 포함)" className="flex-1 px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 font-bold outline-none font-mono" />
                <button type="submit" className="bg-blue-600 text-white font-bold py-4 px-6 rounded-xl hover:bg-blue-700 shadow-md shrink-0 whitespace-nowrap">개별 추가</button>
              </form>
            </div>
          </div>

          <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <div className="p-6 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
              <h3 className="font-bold text-slate-800">등록된 주소록 목록</h3>
              <span className="text-sm font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full">총 {contacts.length}명</span>
            </div>
            <table className="w-full text-left border-collapse">
              <thead>
                <tr className="bg-white border-b border-slate-200">
                  <th className="py-4 px-6 font-bold text-slate-400 text-sm">학년/반</th>
                  <th className="py-4 px-6 font-bold text-slate-400 text-sm">학생 성명</th>
                  <th className="py-4 px-6 font-bold text-slate-400 text-sm">학부모 성명</th>
                  <th className="py-4 px-6 font-bold text-slate-400 text-sm">연락처</th>
                  <th className="py-4 px-6 font-bold text-slate-400 text-sm w-20">관리</th>
                </tr>
              </thead>
              <tbody>
                {sortedContacts.length === 0 && <tr><td colSpan="5" className="py-10 text-center text-slate-400 font-bold">등록된 주소록이 없습니다.</td></tr>}
                {sortedContacts.map(c => (
                  <tr key={c.id} className="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                    <td className="py-4 px-6 text-slate-800 font-bold">{c.studentGrade ? `${c.studentGrade}학년` : ''} {c.studentClass ? `${c.studentClass}반` : ''}</td>
                    <td className="py-4 px-6 text-slate-800 font-bold">{c.studentName}</td>
                    <td className="py-4 px-6 text-slate-800 font-bold">{c.parentName}</td>
                    <td className="py-4 px-6 text-slate-600 font-mono font-medium">{c.phone}</td>
                    <td className="py-4 px-6 text-center">
                       <button onClick={()=>handleDelete(c.id)} className="text-red-400 hover:text-red-600 p-1 bg-red-50 rounded-lg"><Icon name="Trash2" size={16}/></button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    };

    const TeacherSettingsTab = ({ db, appId, user, settings, onToast }) => {
      const [smsApiKey, setSmsApiKey] = useState(settings.smsApiKey || '');
      const [smsApiSecret, setSmsApiSecret] = useState(settings.smsApiSecret || '');
      const [senderPhone, setSenderPhone] = useState(settings.senderPhone || '033-672-4268');
      const [gasUrl, setGasUrl] = useState(settings.gasUrl || '');
      const [driveFolderId, setDriveFolderId] = useState(settings.driveFolderId || '');
      const [isSaving, setIsSaving] = useState(false);

      const handleSaveSettings = async () => {
        setIsSaving(true);
        try {
          await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('settings').doc('config').set({ 
            smsApiKey, smsApiSecret, senderPhone, gasUrl, driveFolderId 
          }, { merge: true });
          onToast('모든 환경설정이 안전하게 저장되었습니다.');
        } catch (error) { onToast('저장 중 오류가 발생했습니다.', 'error'); }
        setIsSaving(false);
      };

      return (
        <div className="max-w-3xl mx-auto animate-fade-in-up space-y-6 pb-20">
          <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-10">
            <h2 className="text-2xl font-black text-slate-800 mb-8 flex items-center gap-2"><Icon name="FolderUp" className="text-blue-600"/> 구글 드라이브 자동 업로드 연동</h2>
            <div className="space-y-6">
              <div>
                <label className="block text-sm font-bold text-slate-700 mb-3">구글 드라이브 폴더 ID</label>
                <input type="text" value={driveFolderId} onChange={e=>setDriveFolderId(e.target.value)} placeholder="저장할 드라이브 폴더의 고유 ID" className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-mono text-lg" />
              </div>
              <div>
                <label className="block text-sm font-bold text-slate-700 mb-3">Google Apps Script 배포 URL</label>
                <input type="text" value={gasUrl} onChange={e=>setGasUrl(e.target.value)} placeholder="https://script.google.com/macros/s/..." className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-mono text-lg" />
                <p className="text-xs text-slate-500 mt-3 font-medium leading-relaxed">
                  * API Key 방식의 오류를 완전히 해결하기 위해 Apps Script(웹 앱) 방식을 사용합니다.<br/>
                  * 알려드린 코드(doPost)를 구글 앱스 스크립트에 배포한 후 생성된 웹 앱 URL을 여기에 붙여넣어 주세요.
                </p>
              </div>
            </div>
          </div>

          <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-10">
            <h2 className="text-2xl font-black text-slate-800 mb-2 flex items-center gap-2"><Icon name="MessageSquare" className="text-blue-600"/> 자동 문자 발송 연동 설정</h2>
            <div className="space-y-8 mt-8">
              <div>
                <label className="block text-sm font-bold text-slate-700 mb-3">발신번호 (학교 번호)</label>
                <input type="text" value={senderPhone} onChange={e=>setSenderPhone(e.target.value)} className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-mono font-bold text-lg text-slate-800" />
              </div>
              <div>
                <label className="block text-sm font-bold text-slate-700 mb-3">API Key (솔라피, 알리고 등)</label>
                <input type="password" value={smsApiKey} onChange={e=>setSmsApiKey(e.target.value)} className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-mono text-lg" />
              </div>
              <div>
                <label className="block text-sm font-bold text-slate-700 mb-3">API Secret (필요한 경우)</label>
                <input type="password" value={smsApiSecret} onChange={e=>setSmsApiSecret(e.target.value)} className="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-mono text-lg" />
              </div>
            </div>
          </div>
          <button onClick={handleSaveSettings} disabled={isSaving} className="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-5 rounded-xl flex items-center justify-center gap-2 transition-all text-lg shadow-lg">
             <Icon name="Save" size={20}/> {isSaving ? '저장 중...' : '모든 설정 저장하기'}
          </button>
        </div>
      );
    };

    const TeacherResultsTab = ({ forms, submissions, selectedFormId, setSelectedFormId, viewMode, setViewMode, onToast, settings }) => {
      const [selectedSub, setSelectedSub] = useState(null);
      const [isUploadingDrive, setIsUploadingDrive] = useState(false);
      const pdfTargetRef = useRef(null);

      const currentForm = forms.find(f => f.id === selectedFormId);
      const currentSubs = submissions.filter(s => s.formId === selectedFormId);

      const downloadExcel = () => {
        if (currentSubs.length === 0) return onToast('제출된 데이터가 없습니다.', 'error');
        const data = currentSubs.map(s => ({
          "제출일시": formatDate(s.createdAt),
          "학년": s.studentGrade,
          "학생이름": s.studentName,
          "관계": s.parentRelation || '-',
          "학부모이름": s.parentName,
          "응답결과": s.consentStatus
        }));
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "제출결과");
        XLSX.writeFile(wb, `${currentForm.title}_제출결과.xlsx`);
        onToast('엑셀 파일이 성공적으로 다운로드되었습니다.');
      };

      const handleUploadToDrive = async () => {
        if (!selectedSub || !currentForm) return onToast('선택된 데이터가 없습니다.', 'error');
        const gasUrlToUse = currentForm.gasUrl || settings.gasUrl;
        const folderIdToUse = currentForm.driveFolderId || settings.driveFolderId;

        if (!gasUrlToUse) return onToast('환경설정에서 Google Apps Script URL을 설정해주세요.', 'error');
        if (!folderIdToUse) return onToast('환경설정에서 드라이브 폴더 ID를 설정해주세요.', 'error');

        setIsUploadingDrive(true);
        const fileName = `${selectedSub.studentGrade}학년_${selectedSub.studentName}_동의서.pdf`;

        try {
          const opt = {
            margin: 0,
            filename: fileName,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true, scrollY: 0 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
          };
          const pdfBlob = await html2pdf().set(opt).from(pdfTargetRef.current).output('blob');

          await uploadToGas(pdfBlob, fileName, gasUrlToUse, folderIdToUse);
          onToast(`해당 학생의 동의서가 드라이브에 안전하게 저장되었습니다!`);
        } catch(e) {
          onToast(`업로드 실패: ${e.message}`, 'error');
        } finally {
          setIsUploadingDrive(false);
        }
      };

      return (
        <div className="max-w-5xl mx-auto animate-fade-in-up pb-20">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
            <h2 className="text-2xl font-black text-slate-800">제출 결과 확인</h2>
            <div className="flex bg-slate-100 p-1.5 rounded-xl border border-slate-200 print:hidden w-full md:w-auto">
              <button onClick={() => setViewMode('status')} className={`flex-1 px-6 py-2.5 rounded-lg text-sm font-bold transition-colors ${viewMode === 'status' ? 'bg-white shadow-sm text-blue-700' : 'text-slate-500'}`}>목록 보기</button>
              <button onClick={() => setViewMode('original')} className={`flex-1 px-6 py-2.5 rounded-lg text-sm font-bold transition-colors ${viewMode === 'original' ? 'bg-white shadow-sm text-blue-700' : 'text-slate-500'}`}>인쇄/원본 보기</button>
            </div>
          </div>

          <div className="flex flex-col md:flex-row gap-4 mb-8 items-center">
            <select value={selectedFormId} onChange={e => {setSelectedFormId(e.target.value); setSelectedSub(null);}} className="w-full md:max-w-xl px-5 py-4 bg-white border-2 border-slate-200 rounded-xl focus:border-blue-500 font-bold text-slate-700 shadow-sm appearance-none print:hidden outline-none text-lg">
              {forms.length === 0 && <option value="">등록된 안내장이 없습니다.</option>}
              {forms.map(f => <option key={f.id} value={f.id}>{f.title} (총 {submissions.filter(s=>s.formId === f.id).length}건 제출)</option>)}
            </select>

            {currentForm?.driveLink && (
              <a href={currentForm.driveLink} target="_blank" rel="noopener noreferrer" className="w-full md:w-auto px-6 py-4 bg-green-50 hover:bg-green-100 text-green-700 border border-green-200 rounded-xl font-bold flex items-center justify-center gap-2 transition-colors print:hidden shadow-sm shrink-0">
                <Icon name="FolderOpen" size={20}/> 보관용 구글 드라이브 열기
              </a>
            )}
          </div>

          {currentForm && viewMode === 'status' && (
            <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
              <div className="p-6 bg-slate-50 border-b flex justify-between items-center flex-wrap gap-4">
                 <span className="font-bold text-slate-700">전체 제출: <span className="text-blue-600 text-lg">{currentSubs.length}</span>명</span>
                 <button onClick={downloadExcel} className="px-5 py-3 bg-green-600 hover:bg-green-700 text-white font-bold rounded-xl text-sm flex items-center gap-2 shadow-sm transition-colors">
                    <Icon name="Download" size={18}/> 엑셀파일로 다운받기
                 </button>
              </div>
              <table className="w-full text-left border-collapse">
                <thead>
                  <tr className="bg-white border-b border-slate-200">
                    <th className="py-4 px-6 font-bold text-slate-400 text-sm">학생</th>
                    <th className="py-4 px-6 font-bold text-slate-400 text-sm">학부모 (관계)</th>
                    <th className="py-4 px-6 font-bold text-slate-400 text-sm">응답결과</th>
                    <th className="py-4 px-6 font-bold text-slate-400 text-sm hidden md:table-cell">제출일시</th>
                  </tr>
                </thead>
                <tbody>
                  {currentSubs.length === 0 && <tr><td colSpan="4" className="py-10 text-center text-slate-400 font-bold">제출된 내역이 없습니다.</td></tr>}
                  {currentSubs.map(s => (
                    <tr key={s.id} className="border-b border-slate-50 hover:bg-slate-50">
                      <td className="py-4 px-6 font-bold text-slate-800">{s.studentGrade}학년 {s.studentName}</td>
                      <td className="py-4 px-6 text-slate-600">{s.parentName} <span className="text-xs text-slate-400">({s.parentRelation||'-'})</span></td>
                      <td className="py-4 px-6">
                        <span className={`px-3 py-1 font-bold rounded-lg text-sm ${getStatusColorClass(s.consentStatus, currentForm)}`}>{s.consentStatus}</span>
                      </td>
                      <td className="py-4 px-6 text-sm text-slate-400 hidden md:table-cell font-mono">{formatDate(s.createdAt)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {currentForm && viewMode === 'original' && (
            <div className="flex flex-col md:flex-row gap-6">
              <div className="w-full md:w-64 bg-white border border-slate-200 rounded-3xl p-3 shrink-0 print:hidden h-fit max-h-[600px] overflow-y-auto no-scrollbar shadow-sm">
                <div className="text-sm font-bold text-slate-400 px-3 mb-2 mt-2">제출자 목록</div>
                {currentSubs.length === 0 && <div className="text-center text-slate-400 text-sm py-4">제출자가 없습니다.</div>}
                {currentSubs.map(s => {
                  return (
                  <button key={s.id} onClick={() => setSelectedSub(s)} className={`w-full text-left px-4 py-4 rounded-2xl text-sm font-bold mb-1 transition-colors ${selectedSub?.id === s.id ? 'bg-slate-800 text-white shadow-md' : 'hover:bg-slate-50 text-slate-700'}`}>
                    <div className="flex justify-between items-center">
                       <span>{s.studentName}</span>
                       <span className={`text-[10px] px-2 py-0.5 rounded-full font-bold ${
                         selectedSub?.id === s.id 
                           ? 'bg-white/20 text-white' 
                           : getStatusColorClass(s.consentStatus, currentForm)
                       }`}>{s.consentStatus}</span>
                    </div>
                  </button>
                )})}
              </div>

              <div className="flex-1 bg-white border border-slate-200 rounded-3xl p-10 min-h-[800px] shadow-sm print:border-none print:shadow-none print:p-0 relative flex justify-center">
                {selectedSub ? (
                  <div className="relative bg-white print:p-0" style={{ width: '210mm', minHeight: '296mm', boxSizing: 'border-box', display: 'flex', flexDirection: 'column', padding: '15mm' }}>
                     
                     <div className="absolute -top-4 -right-4 flex gap-2 z-10 print:hidden">
                        <button onClick={handleUploadToDrive} disabled={isUploadingDrive} className="bg-green-50 hover:bg-green-100 text-green-700 border border-green-200 px-4 py-3 rounded-xl font-bold shadow-lg flex items-center gap-2 transition-colors">
                          {isUploadingDrive ? <div className="animate-spin rounded-full h-4 w-4 border-b-2 border-green-700"></div> : <Icon name="FolderUp" size={18}/>}
                          {isUploadingDrive ? '드라이브 전송 중...' : '이 동의서를 드라이브에 저장'}
                        </button>
                        
                        <button onClick={() => window.print()} className="bg-slate-800 hover:bg-slate-900 text-white px-6 py-3 rounded-xl font-bold shadow-lg flex items-center gap-2 transition-colors">
                          <Icon name="Printer" size={18}/> 인쇄 / PDF 저장
                        </button>
                     </div>
                    
                    <div style={{ textAlign: 'center', borderBottom: '2px solid black', paddingBottom: '10px', marginBottom: '10px', flexShrink: 0 }}>
                      <h1 className="text-2xl font-black m-0">{currentForm?.title || ''}</h1>
                    </div>
                    
                    <div style={{ flex: '1 1 auto', display: 'flex', justifyContent: 'center', alignItems: 'center', overflow: 'hidden', maxHeight: '130mm', marginBottom: '10px' }}>
                      {currentForm?.imageData ? (
                        <img src={currentForm.imageData} style={{ maxWidth: '100%', maxHeight: '100%', objectFit: 'contain' }} alt="안내장 원본" />
                      ) : (
                        <div className="p-10 border-2 border-dashed border-slate-300 rounded-lg text-slate-400 font-bold w-full text-center">첨부된 안내장 이미지가 없습니다.</div>
                      )}
                    </div>
                    
                    <div style={{ borderTop: '2px solid black', paddingTop: '15px', flexShrink: 0 }}>
                      <div className="text-lg mb-4 font-bold leading-relaxed">
                        상기 내용에 <span className={`text-xl underline underline-offset-8 px-2 decoration-2 ${getStatusTextColor(selectedSub?.consentStatus, currentForm)} print:text-black`}>{selectedSub?.consentStatus || ''}</span>.
                      </div>
                      
                      <div className="grid grid-cols-2 gap-4 mb-6 text-base">
                        <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 print:border-slate-300"><span className="text-slate-500 text-xs block mb-1">학생 정보</span><b>{selectedSub?.studentGrade || ''}학년 {selectedSub?.studentName || ''}</b></div>
                        <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 print:border-slate-300"><span className="text-slate-500 text-xs block mb-1">학부모 정보</span><b>{selectedSub?.parentRelation || ''} {selectedSub?.parentName || ''}</b></div>
                      </div>
                      
                      <div className="flex flex-col items-end mr-4">
                        <div className="text-sm mb-2 text-slate-500 font-medium">{formatDate(selectedSub?.createdAt)} 제출됨</div>
                        <div className="flex items-center gap-4 text-xl font-bold">
                          학부모 서명 :
                          <div className="w-32 h-12 border-b-2 border-slate-900 relative flex justify-center items-end pb-1">
                            {selectedSub?.signatureData && <img src={selectedSub.signatureData} className="absolute bottom-1 h-16 object-contain" alt="서명" />}
                          </div>
                        </div>
                      </div>
                      <div className="mt-8 mb-4 text-center font-black text-2xl tracking-widest text-slate-900">상평초등학교장 귀하</div>
                    </div>
                  </div>
                ) : <div className="h-full flex items-center justify-center text-slate-300 font-bold text-xl flex-col gap-4 mt-40"><Icon name="MousePointerClick" size={48}/> 좌측에서 제출자를 선택하세요.</div>}
              </div>
            </div>
          )}

          {/* 구글 드라이브 업로드를 위해 화면 뒤에 숨겨진 1장짜리 PDF 캡처용 영역 */}
          {selectedSub && (
            <div style={{ position: 'absolute', left: '-9999px', top: '-9999px' }}>
              <div ref={pdfTargetRef} style={{ width: '210mm', height: '296mm', padding: '15mm', backgroundColor: 'white', color: 'black', fontFamily: 'sans-serif', boxSizing: 'border-box', display: 'flex', flexDirection: 'column' }}>
                <div style={{ textAlign: 'center', borderBottom: '2px solid black', paddingBottom: '10px', marginBottom: '10px', flexShrink: 0 }}>
                  <h1 style={{ fontSize: '22px', fontWeight: 'bold', margin: 0 }}>{currentForm?.title || ''}</h1>
                </div>
                
                <div style={{ flex: '1 1 auto', display: 'flex', justifyContent: 'center', alignItems: 'center', overflow: 'hidden', minHeight: '80mm', maxHeight: '130mm', marginBottom: '10px' }}>
                  {currentForm?.imageData && <img src={currentForm.imageData} style={{ maxWidth: '100%', maxHeight: '100%', objectFit: 'contain' }} alt="안내장 원본" />}
                </div>
                
                <div style={{ borderTop: '2px solid black', paddingTop: '15px', flexShrink: 0 }}>
                  <p style={{ fontSize: '18px', marginBottom: '15px' }}>
                    상기 내용에 <strong style={{ textDecoration: 'underline', color: getStatusTextColor(selectedSub?.consentStatus, currentForm).includes('text-blue') ? '#1d4ed8' : getStatusTextColor(selectedSub?.consentStatus, currentForm).includes('text-red') ? '#b91c1c' : '#000000' }}>{selectedSub?.consentStatus || ''}</strong>.
                  </p>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '15px' }}>
                    <div style={{ padding: '10px', border: '1px solid #ccc', borderRadius: '8px', width: '48%' }}>
                      <span style={{ fontSize: '12px', color: '#666', display: 'block' }}>학생 정보</span>
                      <strong>{selectedSub?.studentGrade || ''}학년 {selectedSub?.studentName || ''}</strong>
                    </div>
                    <div style={{ padding: '10px', border: '1px solid #ccc', borderRadius: '8px', width: '48%' }}>
                      <span style={{ fontSize: '12px', color: '#666', display: 'block' }}>학부모 정보</span>
                      <strong>{selectedSub?.parentRelation || ''} {selectedSub?.parentName || ''}</strong>
                    </div>
                  </div>
                  <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', marginRight: '10px' }}>
                     <span style={{ fontSize: '14px', color: '#666', marginBottom: '5px' }}>{formatDate(selectedSub?.createdAt)} 제출됨</span>
                     <div style={{ display: 'flex', alignItems: 'flex-end', fontSize: '18px', fontWeight: 'bold' }}>
                        학부모 서명:
                        <div style={{ width: '120px', borderBottom: '2px solid black', marginLeft: '10px', textAlign: 'center', height: '40px', position: 'relative' }}>
                          {selectedSub?.signatureData && <img src={selectedSub.signatureData} style={{ maxHeight: '100%', maxWidth: '100%', position: 'absolute', bottom: '2px', left: '50%', transform: 'translateX(-50%)' }} />}
                        </div>
                     </div>
                  </div>
                  <h2 style={{ textAlign: 'center', marginTop: '20px', fontSize: '22px', fontWeight: 'bold', letterSpacing: '2px' }}>상평초등학교장 귀하</h2>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const MainApp = () => {
      const [user, setUser] = useState(null);
      const [isTeacher, setIsTeacher] = useState(false);
      const [loading, setLoading] = useState(true);
      const [toast, setToast] = useState(null);
      const [formId, setFormId] = useState(new URLSearchParams(window.location.search).get('formId'));

      const showToast = (msg, type = 'success') => setToast({ message: msg, type });

      useEffect(() => {
        auth.onAuthStateChanged((currentUser) => {
          setUser(currentUser);
          setIsTeacher(currentUser?.providerData?.some(p => p.providerId === 'google.com'));
          setLoading(false);
        });
        
        if (formId && !user) {
          auth.signInAnonymously().catch(e => console.error(e));
        }
      }, [formId]);

      if (loading) return <div className="min-h-screen flex items-center justify-center"><div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div></div>;

      return (
        <>
          {formId ? (
            <ParentView formId={formId} onToast={showToast} />
          ) : isTeacher ? (
            <TeacherView user={user} onToast={showToast} />
          ) : (
            <div className="min-h-screen bg-slate-50 flex items-center justify-center p-6">
              <div className="bg-white p-10 rounded-3xl shadow-xl max-w-md w-full text-center border border-slate-100">
                <div className="w-24 h-24 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6"><Icon name="FileSignature" size={48} className="text-blue-600"/></div>
                <h1 className="text-2xl font-black text-slate-800 mb-2 tracking-tight">e-가정통신문</h1>
                <p className="text-slate-500 mb-10 text-sm font-medium">상평초등학교 공수전분교장</p>
                <button onClick={() => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())} className="w-full bg-white border-2 border-slate-200 text-slate-700 font-bold py-4 rounded-xl shadow-sm hover:bg-slate-50 flex items-center justify-center gap-3 transition-colors text-lg">
                  <svg className="w-5 h-5" viewBox="0 0 24 24">
                     <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                     <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                     <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                     <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                  </svg>
                  구글 계정으로 시작하기 (관리자 로그인)
                </button>
              </div>
            </div>
          )}
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
        </>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MainApp />);
  </script>
</body>
</html>
